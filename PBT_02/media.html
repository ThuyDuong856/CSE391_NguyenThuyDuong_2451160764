<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu Sản phẩm - Multimedia</title>
</head>
<body>

    <header>
        <!-- Logo SVG đơn giản (Hình tròn + Chữ) -->
        <svg width="100" height="50" viewBox="0 0 100 50" xmlns="http://w3.org">
            <rect width="100%" height="100%" fill="none" />
            <circle cx="25" cy="25" r="20" fill="#007bff" />
            <text x="50" y="32" font-family="Arial" font-size="20" fill="#333">TECH</text>
        </svg>
        <h1>Siêu phẩm Smartphone X - 2026</h1>
    </header>

    <!-- Section 1: Hình ảnh sản phẩm -->
    <section>
        <h2>Hình ảnh thực tế</h2>
        
        <figure>
            <img src="https://www.xtsmart.vn/vnt_upload/news/06_2025/tinh-nang-always-on-display-tren-iphone-16-pro-co-gi-xtsmart.jpg" 
                 alt="Mặt trước iPhone 16 Pro với màn hình Always-on Display" 
                 loading="lazy">
            <figcaption>Thiết kế tràn viền tinh tế, độ sáng cực cao.</figcaption>
        </figure>

        <figure>
            <img src="https://cdn2.fptshop.com.vn/unsafe/800x0/camera_iphone_16_pro_max_2_efa793c682.jpg" 
                 alt="Cận cảnh cụm 3 camera đặt trong module hình vuông" 
                 loading="lazy">
            <figcaption>Hệ thống camera chuyên nghiệp hỗ trợ quay phim 4K.</figcaption>
        </figure>

        <figure>
            <img src="https://cdn-media.sforum.vn/storage/app/media/doanphuong/iphone-16-pro-max-mau-titan-sa-mac/iphone-16-pro-max-mau-titan-sa-mac-%20(5).jpg" 
                 alt="Các lựa chọn màu sắc Titan Sa mạc và Titan Đen" 
                 loading="lazy">
            <figcaption>Bảng màu đa dạng phù hợp với mọi phong cách.</figcaption>
        </figure>
    </section>

    <!-- Section 2: Video nhúng YouTube -->
    <section>
        <h2>Video trên tay (YouTube)</h2>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/vfKiaXKO44M?si=niP_r3xPtDUZV9L3" 
                title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; 
                encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </section>

    <!-- Section 3: Thẻ Video nội bộ -->
    <section>
        <h2>Video giới thiệu tính năng (Local)</h2>
        <video controls poster="https://bachlongstore.vn/apple-iphone-16-pro-512gb-99-.html?srsltid=AfmBOoqcs4Pad2sVTw_-lHWVFnGpG6uamvDZPRtLfDue4C9t5N2aavJg">
            <source src="https://drive.google.com/file/d/1fEwUqCKsiW6YTdYMiH8vzIzLmM0v7hKe/view?usp=drive_link" type="video/mp4">
            <source src="intro-video.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ xem video này.
        </video>
    </section>

    <!-- Section 4: Âm thanh -->
    <section>
        <h2>Nhạc nền trải nghiệm</h2>
        <p>Thư giãn trong khi tìm hiểu về sản phẩm:</p>
        <audio controls>
            <source src="https://drive.google.com/file/d/1lOfuuEMsgQB7om9-vOt6tFDCgwsL_DBE/view?usp=drive_link" type="audio/mpeg">
            <source src="background-music.ogg" type="audio/ogg">
            Trình duyệt của bạn không hỗ trợ nghe nhạc.
        </audio>
    </section>

    <footer>
        <p>&copy; 2026 E-Commerce Store. All rights reserved.</p>
    </footer>

</body>
</html>
