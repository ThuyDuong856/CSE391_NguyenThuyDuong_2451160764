<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Tài khoản - E-Commerce</title>
</head>
<body>

    <h1>Đăng ký Tài khoản</h1>
    <form action="#" method="POST">

        <!-- Fieldset 1: Thông tin cá nhân -->
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <div>
                <label for="fullname">Họ tên:</label>
                <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Nhập họ và tên đầy đủ">
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="example@gmail.com">
            </div>
            <div>
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="Nhập 10 chữ số (VD: 0912345678)">
            </div>
            <div>
                <label for="dob">Ngày sinh:</label>
                <input type="date" id="dob" name="dob" max="2026-05-01" placeholder="Chọn ngày sinh">
            </div>
        </fieldset>

        <!-- Fieldset 2: Tài khoản -->
        <fieldset>
            <legend>Tài khoản</legend>
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" pattern="^[a-zA-Z0-9_]{3,20}$" placeholder="3-20 ký tự (chữ, số, _)">
            </div>
            <div>
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" name="password" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-4]).*" placeholder="Ít nhất 8 ký tự, 1 chữ hoa, 1 số">
            </div>
            <div>
                <label for="confirm_password">Xác nhận mật khẩu:</label>
                <input type="password" id="confirm_password" name="confirm_password" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-4]).*" placeholder="Nhập lại mật khẩu">
            </div>
        </fieldset>

        <!-- Fieldset 3: Thông tin giao hàng -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <div>
                <label for="city">Thành phố:</label>
                <select id="city" name="city">
                    <option value="">--Chọn Thành phố--</option>
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="haiphong">Hải Phòng</option>
                    <option value="cantho">Cần Thơ</option>
                </select>
            </div>
            <div>
                <label for="district">Quận/Huyện:</label>
                <select id="district" name="district">
                    <option value="q1">Quận 1 / Ba Đình</option>
                    <option value="q2">Quận 2 / Hoàn Kiếm</option>
                </select>
            </div>
            <div>
                <label for="address">Địa chỉ chi tiết:</label>
                <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường..."></textarea>
            </div>
            <div class="radio-group">
                <label>Giới tính:</label><br>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Nam</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Nữ</label>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Khác</label>
            </div>
        </fieldset>

        <div>
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms" style="display: inline;">Tôi đồng ý với điều khoản sử dụng</label>
        </div>

        <div style="margin-top: 20px;">
            <button type="submit">Đăng ký ngay</button>
            <button type="reset">Nhập lại</button>
        </div>
    </form>

</body>
</html>
